name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run compile
      - run: npx @vscode/vsce package --no-dependencies --out canto.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: canto-vsix
          path: canto.vsix
